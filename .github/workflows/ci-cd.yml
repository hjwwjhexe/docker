name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and test in Docker
        run: |
          docker compose --profile test run --rm test

  build-and-deploy:
    needs: test
    runs-on: self-hosted
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build and save Docker image
        run: |
          docker build -t docker-app:latest .
          docker save docker-app:latest | gzip > docker-app.tar.gz

      - name: Copy image to server and deploy
        run: |
          ssh -p 58529 -o StrictHostKeyChecking=no hugle@kubsu.tyvik.ru "mkdir -p ~/docker-app"
          scp -P 58529 -o StrictHostKeyChecking=no docker-app.tar.gz hugle@kubsu.tyvik.ru:~/docker-app/
          ssh -p 58529 -o StrictHostKeyChecking=no hugle@kubsu.tyvik.ru << 'EOF'
            # Остановить тестовый сервер на порту 8066
            pkill -u $(whoami) -f srv8066.py 2>/dev/null || true
            sleep 2
            cd ~/docker-app
            podman load < docker-app.tar.gz
            podman stop docker-app 2>/dev/null || true
            podman rm docker-app 2>/dev/null || true
            podman run -d --name docker-app -p 8066:8066 docker-app:latest
            rm docker-app.tar.gz
            echo "Deployed with Podman!"
          EOF
