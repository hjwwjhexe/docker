name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and test in Docker
        run: |
          docker compose --profile test run --rm test

  deploy:
    needs: test
    runs-on: self-hosted
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server via SSH
        run: |
          ssh -p 58529 -o StrictHostKeyChecking=no hugle@kubsu.tyvik.ru << 'EOF'
            cd /home/hugle/tasks/docker
            git pull origin master
            # Остановить своё старое приложение если запущено
            pkill -u $(whoami) -f "uvicorn src.main:app" 2>/dev/null || true
            # Установить зависимости через python3 -m pip
            python3 -m pip install -e "." --user --break-system-packages 2>/dev/null || python3 -m pip install -e "." --user
            # Запустить приложение в фоне
            nohup python3 -m uvicorn src.main:app --host 127.0.0.1 --port 8066 > app.log 2>&1 &
            sleep 2
            ps aux | grep uvicorn | grep -v grep || echo "App may not have started"
            echo "Deployed!"
          EOF
