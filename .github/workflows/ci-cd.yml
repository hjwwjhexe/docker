name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and test in Docker
        run: |
          docker compose --profile test run --rm test

  deploy:
    needs: test
    runs-on: self-hosted
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server via SSH
        run: |
          ssh -p 58529 -o StrictHostKeyChecking=no hugle@kubsu.tyvik.ru << 'EOF'
            cd /home/hugle/tasks/docker
            git pull origin master
            # Остановить старое приложение если запущено
            pkill -f "uvicorn src.main:app" || true
            # Установить зависимости
            pip install -e ".[test]" --user
            # Запустить приложение в фоне
            nohup python -m uvicorn src.main:app --host 127.0.0.1 --port 8066 > app.log 2>&1 &
            echo "Deployed!"
          EOF
