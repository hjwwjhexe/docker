<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }
        .nav {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .nav button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: white;
            color: #667eea;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nav button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .nav button.active {
            background: #667eea;
            color: white;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .section {
            display: none;
        }
        .section.active {
            display: block;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }
        button.action {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        button.action:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.4);
        }
        .result {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            min-height: 100px;
        }
        .result pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 14px;
            color: #333;
        }
        .user-list {
            display: grid;
            gap: 10px;
        }
        .user-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .user-item:hover {
            background: #e9ecef;
        }
        .user-id {
            font-weight: 600;
            color: #667eea;
        }
        .loading {
            text-align: center;
            color: #667eea;
            padding: 20px;
        }
        .error {
            color: #dc3545;
            padding: 10px;
            background: #f8d7da;
            border-radius: 8px;
            margin-top: 10px;
        }
        .success {
            color: #155724;
            padding: 10px;
            background: #d4edda;
            border-radius: 8px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Users Management</h1>
        
        <div class="nav">
            <button onclick="showSection('list')" class="active" id="btn-list">List Users</button>
            <button onclick="showSection('create')" id="btn-create">Create User</button>
            <button onclick="showSection('get')" id="btn-get">Get User</button>
            <button onclick="showSection('update')" id="btn-update">Update User</button>
            <button onclick="showSection('delete')" id="btn-delete">Delete User</button>
        </div>

        <div class="card">
            <!-- List Users -->
            <div id="list" class="section active">
                <h2>All Users</h2>
                <button class="action" onclick="loadUsers()">Refresh List</button>
                <div id="users-list" class="result">
                    <div class="loading">Click "Refresh List" to load users</div>
                </div>
            </div>

            <!-- Create User -->
            <div id="create" class="section">
                <h2>Create New User</h2>
                <div class="form-group">
                    <label for="create-name">Name:</label>
                    <input type="text" id="create-name" placeholder="Enter user name">
                </div>
                <button class="action" onclick="createUser()">Create User</button>
                <div id="create-result" class="result" style="display:none;"></div>
            </div>

            <!-- Get User -->
            <div id="get" class="section">
                <h2>Get User by ID</h2>
                <div class="form-group">
                    <label for="get-id">User ID:</label>
                    <input type="number" id="get-id" placeholder="Enter user ID">
                </div>
                <button class="action" onclick="getUser()">Get User</button>
                <div id="get-result" class="result" style="display:none;"></div>
            </div>

            <!-- Update User -->
            <div id="update" class="section">
                <h2>Update User</h2>
                <div class="form-group">
                    <label for="update-id">User ID:</label>
                    <input type="number" id="update-id" placeholder="Enter user ID">
                </div>
                <div class="form-group">
                    <label for="update-name">New Name:</label>
                    <input type="text" id="update-name" placeholder="Enter new name">
                </div>
                <button class="action" onclick="updateUser()">Update User</button>
                <div id="update-result" class="result" style="display:none;"></div>
            </div>

            <!-- Delete User -->
            <div id="delete" class="section">
                <h2>Delete User</h2>
                <div class="form-group">
                    <label for="delete-id">User ID:</label>
                    <input type="number" id="delete-id" placeholder="Enter user ID">
                </div>
                <button class="action" onclick="deleteUser()">Delete User</button>
                <div id="delete-result" class="result" style="display:none;"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/users';

        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            document.getElementById('btn-' + sectionId).classList.add('active');
        }

        function showResult(elementId, data, isError = false) {
            const element = document.getElementById(elementId);
            element.style.display = 'block';
            if (isError) {
                element.innerHTML = `<div class="error">Error: ${data}</div>`;
            } else {
                element.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            }
        }

        async function loadUsers() {
            const listDiv = document.getElementById('users-list');
            listDiv.innerHTML = '<div class="loading">Loading...</div>';
            
            try {
                const response = await fetch(API_URL + '/');
                const users = await response.json();
                
                if (!response.ok) {
                    throw new Error(users.detail || 'Failed to load users');
                }

                if (users.length === 0) {
                    listDiv.innerHTML = '<div class="loading">No users found</div>';
                    return;
                }

                let html = '<div class="user-list">';
                users.forEach(user => {
                    html += `
                        <div class="user-item">
                            <span><span class="user-id">#${user.id}</span> ${user.name}</span>
                            <button class="action" onclick="fillGetUser(${user.id})">View</button>
                        </div>
                    `;
                });
                html += '</div>';
                listDiv.innerHTML = html;
            } catch (error) {
                listDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        async function createUser() {
            const name = document.getElementById('create-name').value;
            if (!name) {
                showResult('create-result', 'Please enter a name', true);
                return;
            }

            try {
                const response = await fetch(API_URL + '/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.detail || 'Failed to create user');
                }

                showResult('create-result', { success: true, user: data });
                document.getElementById('create-name').value = '';
            } catch (error) {
                showResult('create-result', error.message, true);
            }
        }

        async function getUser() {
            const id = document.getElementById('get-id').value;
            if (!id) {
                showResult('get-result', 'Please enter a user ID', true);
                return;
            }

            try {
                const response = await fetch(API_URL + '/' + id);
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.detail || 'User not found');
                }

                showResult('get-result', data);
            } catch (error) {
                showResult('get-result', error.message, true);
            }
        }

        function fillGetUser(id) {
            document.getElementById('get-id').value = id;
            showSection('get');
            getUser();
        }

        async function updateUser() {
            const id = document.getElementById('update-id').value;
            const name = document.getElementById('update-name').value;
            
            if (!id || !name) {
                showResult('update-result', 'Please enter both ID and name', true);
                return;
            }

            try {
                const response = await fetch(API_URL + '/' + id, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.detail || 'Failed to update user');
                }

                showResult('update-result', { success: true, user: data });
                document.getElementById('update-id').value = '';
                document.getElementById('update-name').value = '';
            } catch (error) {
                showResult('update-result', error.message, true);
            }
        }

        async function deleteUser() {
            const id = document.getElementById('delete-id').value;
            if (!id) {
                showResult('delete-result', 'Please enter a user ID', true);
                return;
            }

            if (!confirm('Are you sure you want to delete user #' + id + '?')) {
                return;
            }

            try {
                const response = await fetch(API_URL + '/' + id, {
                    method: 'DELETE'
                });
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.detail || 'Failed to delete user');
                }

                showResult('delete-result', { success: true, message: data });
                document.getElementById('delete-id').value = '';
            } catch (error) {
                showResult('delete-result', error.message, true);
            }
        }

        // Load users on page load
        window.onload = loadUsers;
    </script>
</body>
</html>
